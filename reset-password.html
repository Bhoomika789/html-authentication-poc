<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Reset Password</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<!-- Custom CSS -->
<link rel="stylesheet" href="styles.css">

</head>

<body>

<div class="container d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow" style="width:400px">

<h3 class="text-center mb-4">Reset Password</h3>

<form>

<!-- New Password -->
<div class="mb-3 position-relative">
<label class="form-label">New Password</label>
<input type="password" class="form-control" id="newPassword" placeholder="Enter new password">
<i class="bi bi-eye-slash position-absolute top-50 end-0 translate-middle-y me-3" onclick="togglePassword('newPassword', this)" style="cursor:pointer;"></i>
</div>

<!-- Confirm Password -->
<div class="mb-3 position-relative">
<label class="form-label">Confirm Password</label>
<input type="password" class="form-control" id="confirmPassword" placeholder="Confirm password">
<i class="bi bi-eye-slash position-absolute top-50 end-0 translate-middle-y me-3" onclick="togglePassword('confirmPassword', this)" style="cursor:pointer;"></i>
</div>

<a href="login.html" class="btn btn-warning w-100">
Update Password
</a>

</form>

<div class="text-center mt-3">
<a href="login.html">Back to Login</a>
</div>

</div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Toggle Script -->
<script>
function togglePassword(fieldId, icon){
    const input = document.getElementById(fieldId);
    if(input.type === "password"){
        input.type = "text";
        icon.classList.remove("bi-eye-slash");
        icon.classList.add("bi-eye");
    } else {
        input.type = "password";
        icon.classList.remove("bi-eye");
        icon.classList.add("bi-eye-slash");
    }
}
</script>

</body>
</html>
